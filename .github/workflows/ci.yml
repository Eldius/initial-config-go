name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true
      - name: Go mod tidy
        run: go mod tidy
      - name: Tests
        run: make test
      - name: Vulnerability Check
        run: make vulncheck
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
